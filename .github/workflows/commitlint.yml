name: Commit Lint

# Validates that every PR title follows Conventional Commits, keeping the
# main-branch history readable and greppable by change type.
#
# Valid types: feat, fix, perf, docs, style, refactor, test, build, ci, chore, revert
# Breaking change: append ! after the type  e.g.  feat!: drop Dart 2 support
#
# Reference: https://www.conventionalcommits.org

on:
  pull_request:
    branches: [main]
    types:
      - opened
      - edited
      - synchronize
      - reopened

concurrency:
  group: commitlint-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lint-pr-title:
    name: Lint PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read   # read PR metadata (title)

    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Types that trigger a version bump (feat → minor, fix/perf → patch).
          # All other types are allowed but produce no version bump.
          types: |
            feat
            fix
            perf
            docs
            style
            refactor
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The PR title must start with a lowercase letter.
            ✗  Fix UDP sender timeout
            ✓  fix(sender): increase UDP socket timeout to 500 ms
