name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch/PR when a newer push arrives.
# Tags are handled by release.yml which has its own concurrency guard.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Dart ${{ matrix.sdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk: [stable, beta]

    steps:
      - uses: actions/checkout@v7

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Install dependencies
        run: dart pub get

      # Run format and publish dry-run only on stable — they are
      # SDK-version-invariant checks and running them twice adds no value.
      - name: Verify formatting
        if: matrix.sdk == 'stable'
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-warnings

      - name: Test
        run: dart test --reporter=github

      # Catch publish blockers (missing LICENSE, bad pubspec, oversized files)
      # on every CI run so they never reach the release workflow.
      - name: Publish dry run
        if: matrix.sdk == 'stable'
        run: dart pub publish --dry-run
