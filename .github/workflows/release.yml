name: Release

# Two-phase release pipeline:
#
#   Phase 1 — auto-tag  (triggers: push to main)
#     Analyzes Conventional Commits since the last tag, computes the next
#     semver, verifies CHANGELOG.md has a matching section, bumps
#     pubspec.yaml, commits, and pushes an annotated tag.
#
#   Phase 2 — test → publish  (triggers: push of v* tag)
#     Runs the full test matrix on the tagged commit; only if every matrix
#     job passes does the publish job create the GitHub Release and push
#     to pub.dev via OIDC.  No third-party "wait" action needed — the
#     `needs: test` dependency acts as the gate.

on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']

# Never let two release runs race on the same ref.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 1 — compute next version and push annotated tag
  # ═══════════════════════════════════════════════════════════════════════════
  auto-tag:
    name: Auto-tag
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push version-bump commit + tag

    outputs:
      released: ${{ steps.bump.outputs.released }}
      version:  ${{ steps.bump.outputs.version }}

    steps:
      - name: Checkout (full history for tag discovery)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Compute next semver from Conventional Commits ─────────────────────
      - name: Compute next version
        id: bump
        run: |
          set -euo pipefail

          LAST_TAG=$(git describe --tags --abbrev=0 --match='v[0-9]*' 2>/dev/null || true)
          if [ -z "$LAST_TAG" ]; then
            RANGE=$(git rev-list --max-parents=0 HEAD | tail -1)
            echo "No previous tag — scanning from root commit."
          else
            RANGE="$LAST_TAG"
            echo "Scanning commits since $LAST_TAG."
          fi

          COMMITS=$(git log --format='%s%n%b%n---' "${RANGE}..HEAD" 2>/dev/null || true)
          if [ -z "$COMMITS" ]; then
            echo "No new commits since last tag."
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── Classify bump type ──────────────────────────────────────────
          # Priority: breaking > feat > fix/perf. Non-versioned types
          # (docs, chore, refactor, test, style, ci, build) → no release.
          BUMP="none"
          while IFS= read -r line; do
            # Body-level breaking change footer
            if echo "$line" | grep -qE '^(BREAKING CHANGE|BREAKING-CHANGE):'; then
              BUMP="major"; break
            fi
            # Subject-line breaking change:  type! or type(scope)!
            if echo "$line" | grep -qE '^[a-z]+(\([^)]+\))?!:'; then
              BUMP="major"; break
            fi
            if echo "$line" | grep -qE '^feat(\([^)]+\))?:' && [ "$BUMP" = "none" ]; then
              BUMP="minor"
            fi
            if echo "$line" | grep -qE '^(fix|perf)(\([^)]+\))?:' && [ "$BUMP" = "none" ]; then
              BUMP="patch"
            fi
          done <<< "$COMMITS"

          if [ "$BUMP" = "none" ]; then
            echo "No releasable commits (no feat / fix / perf / BREAKING)."
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          IFS=. read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Pre-1.0 policy: a BREAKING commit bumps minor, not major.
          # Remove this block once the package reaches 1.0.0.
          if [ "$MAJOR" = "0" ] && [ "$BUMP" = "major" ]; then
            echo "Pre-1.0: downgrading breaking → minor bump."
            BUMP="minor"
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEXT="${MAJOR}.${MINOR}.${PATCH}"

          echo "current=$CURRENT  next=$NEXT  bump=$BUMP"
          echo "released=true"  >> "$GITHUB_OUTPUT"
          echo "version=$NEXT"  >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP"     >> "$GITHUB_OUTPUT"

      # ── Validate CHANGELOG before touching anything ───────────────────────
      - name: Verify CHANGELOG entry
        if: steps.bump.outputs.released == 'true'
        run: |
          set -euo pipefail
          VERSION="${{ steps.bump.outputs.version }}"
          if ! grep -qE "^## ${VERSION}( |$)" CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::Missing '## ${VERSION}' section."
            echo ""
            echo "Conventional Commits determined the next release is ${VERSION}."
            echo "Add a '## ${VERSION}' section to CHANGELOG.md and push again."
            exit 1
          fi
          echo "✅ CHANGELOG.md has '## ${VERSION}' section."

      # ── Bump pubspec.yaml, commit, tag, push ─────────────────────────────
      - name: Bump version and push tag
        if: steps.bump.outputs.released == 'true'
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists — was this release already cut?"
            exit 1
          fi

          sed -i -E "s/^version: .*/version: ${VERSION}/" pubspec.yaml

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pubspec.yaml
          # [skip ci] suppresses the branch-push CI trigger; the tag push
          # below triggers the Phase 2 test+publish jobs instead.
          git commit -m "chore(release): ${VERSION} [skip ci]"
          git tag -a "$TAG" -m "Release ${VERSION}"

          # Atomic push — commit lands on main, tag fires Phase 2.
          git push origin "HEAD:${GITHUB_REF_NAME}" "$TAG"
          echo "🏷️  Pushed $TAG"

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 2a — full test matrix on the tagged commit
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    name: Test (Dart ${{ matrix.sdk }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk: [stable, beta]

    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - run: dart pub get

      - name: Verify formatting
        if: matrix.sdk == 'stable'
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-warnings

      - name: Test
        run: dart test --reporter=github

      - name: Publish dry run
        if: matrix.sdk == 'stable'
        run: dart pub publish --dry-run

  # ═══════════════════════════════════════════════════════════════════════════
  # PHASE 2b — create GitHub Release and publish to pub.dev
  #            only runs after every test matrix job passes
  # ═══════════════════════════════════════════════════════════════════════════
  publish:
    name: Publish
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub Release
      id-token: write   # OIDC token for pub.dev automated publishing

    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - run: dart pub get

      # ── Guard: tag must match pubspec version ─────────────────────────────
      - name: Verify tag ↔ pubspec version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PUBSPEC=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          if [ "$TAG" != "$PUBSPEC" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match pubspec version ${PUBSPEC}."
            echo "Either the tag was pushed manually out of band, or the auto-tag"
            echo "version-bump commit was not included in the tagged SHA."
            exit 1
          fi
          echo "✅ Tag ${GITHUB_REF_NAME} matches pubspec version ${PUBSPEC}."

      # ── Detect pre-release (e.g. 1.0.0-rc.1, 0.2.0-beta.1) ──────────────
      - name: Detect pre-release
        id: meta
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          if echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-(alpha|beta|rc)'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "⚠️  Pre-release detected: $VERSION"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "✅ Stable release: $VERSION"
          fi

      # ── Extract this version's section from CHANGELOG.md ─────────────────
      - name: Extract release notes
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk -v v="$VERSION" '
            $0 ~ "^## " v "( |$)" { found=1; next }
            found && /^## /       { exit }
            found                 { print }
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "::error file=CHANGELOG.md::No '## ${VERSION}' section found."
            exit 1
          fi
          echo "$NOTES" > "$RUNNER_TEMP/release_notes.md"
          echo "Release notes extracted ($(wc -l < "$RUNNER_TEMP/release_notes.md") lines)."

      # ── Final publish dry-run on the exact tagged tree ────────────────────
      - name: Publish dry run (final gate)
        run: dart pub publish --dry-run

      # ── Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_name }}
          name:       ${{ github.ref_name }}
          body_path:  ${{ runner.temp }}/release_notes.md
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}

      # ── Publish to pub.dev via OIDC (no token stored in secrets) ─────────
      # Requires automated publishing to be enabled on pub.dev:
      #   https://pub.dev/packages/aws_xray_sdk/admin
      #   Repository: mohamed-abdelsamei/aws-xray-sdk-dart
      #   Workflow:   .github/workflows/release.yml
      #   Tag pattern: v{{version}}
      - name: Publish to pub.dev
        run: dart pub publish --force

      # ── Write a job summary for the audit trail ───────────────────────────
      - name: Job summary
        if: always()
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PRERELEASE="${{ steps.meta.outputs.prerelease }}"
          {
            echo "## 🚀 Release ${GITHUB_REF_NAME}"
            echo ""
            if [ "$PRERELEASE" = "true" ]; then
              echo "> ⚠️ **Pre-release** — not marked as latest on pub.dev."
              echo ""
            fi
            echo "| | |"
            echo "|---|---|"
            echo "| **Version** | \`${VERSION}\` |"
            echo "| **Tag** | \`${GITHUB_REF_NAME}\` |"
            echo "| **Commit** | \`${GITHUB_SHA:0:7}\` |"
            echo "| **pub.dev** | [aws_xray_sdk ${VERSION}](https://pub.dev/packages/aws_xray_sdk/versions/${VERSION}) |"
            echo "| **GitHub Release** | ${{ steps.gh_release.outputs.url }} |"
            echo ""
            echo "### Release notes"
            echo ""
            cat "$RUNNER_TEMP/release_notes.md" 2>/dev/null || echo "_Notes unavailable._"
          } >> "$GITHUB_STEP_SUMMARY"
