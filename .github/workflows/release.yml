name: Auto-release

# Auto-tags a release when a version bump lands on main.
#
# When a push to main changes `version:` in pubspec.yaml, this workflow
# validates the release metadata and pushes the matching `vX.Y.Z` tag. The tag
# push then triggers publish.yml, which owns the rest of the pipeline:
# test matrix -> tag/pubspec verification -> GitHub Release -> pub.dev publish
# (OIDC).
#
# Why a PAT: a tag pushed with the default GITHUB_TOKEN does not trigger other
# workflows (GitHub blocks recursive runs), so publish.yml would never fire.
# And pub.dev's OIDC exchange only accepts runs triggered by a tag matching the
# configured pattern (v{{version}}), so this workflow cannot publish directly
# from the main-branch ref either. The tag must therefore be pushed with a
# token that can trigger workflows:
#
#   Setup (one time): create a fine-grained PAT with "Contents: Read and write"
#   on this repository and save it as the repo secret RELEASE_PAT.
#
# Idempotent: re-runs and non-release merges are skipped (no version change,
# or the tag already exists). Manual tagging (AGENT.md) remains a valid
# fallback and coexists with this workflow.

on:
  push:
    branches: [main]
    paths:
      - 'pubspec.yaml'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    name: Tag release on version bump
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2 # need the parent commit to diff the version
          # Fall back to the default token so detection still runs (and the
          # "Require RELEASE_PAT" step can fail with an actionable message)
          # when the secret is not configured yet.
          token: ${{ secrets.RELEASE_PAT || github.token }}

      - name: Detect version bump
        id: detect
        run: |
          set -euo pipefail
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          TAG="v${VERSION}"
          PREV=$(git show 'HEAD^:pubspec.yaml' 2>/dev/null \
                   | grep '^version:' | awk '{print $2}' || true)

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          if [ "$VERSION" = "$PREV" ]; then
            echo "Version unchanged (${VERSION}); not a release."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git ls-remote --tags --exit-code origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists; nothing to do."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Release detected: ${PREV:-<none>} -> ${VERSION}."
          echo "release=true" >> "$GITHUB_OUTPUT"

      - name: Verify CHANGELOG has a matching section
        if: steps.detect.outputs.release == 'true'
        run: |
          set -euo pipefail
          VERSION="${{ steps.detect.outputs.version }}"
          if ! grep -qE "^## ${VERSION}( |$)" CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::No '## ${VERSION}' section — publish.yml would fail to build the GitHub Release. Add the section before bumping the version."
            exit 1
          fi
          echo "✅ CHANGELOG has a '## ${VERSION}' section."

      - name: Require RELEASE_PAT
        if: steps.detect.outputs.release == 'true'
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          if [ -z "$RELEASE_PAT" ]; then
            echo "::error::Repo secret RELEASE_PAT is not set. A tag pushed with GITHUB_TOKEN cannot trigger publish.yml — create a fine-grained PAT (Contents: Read and write) and save it as RELEASE_PAT, or tag manually per AGENT.md."
            exit 1
          fi

      - name: Create and push tag
        if: steps.detect.outputs.release == 'true'
        run: |
          set -euo pipefail
          TAG="${{ steps.detect.outputs.tag }}"
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag -a "$TAG" -m "Release ${{ steps.detect.outputs.version }}"
          git push origin "$TAG"
          echo "✅ Pushed ${TAG} — publish.yml takes it from here."
