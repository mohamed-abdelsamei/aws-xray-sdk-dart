name: aws_xray_sdk
description: AWS X-Ray distributed tracing for Dart. Auto-traces dart:io HTTP and Smithy SDK clients, propagates X-Amzn-Trace-Id, and sends segments via UDP. First-class Lambda support.
version: 0.2.1
repository: https://github.com/mohamed-abdelsamei/aws-xray-sdk-dart

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  http: ^1.0.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.24.0
